# Example YAML configuration for RTL optimization baseline run
# This file defines the benchmark configuration and is passed through the pipeline

# Benchmark identification
benchmark:
  name: "PipelineDino"
  top_module: "PipelinedCPU"
  design_type: "CPU"
  profile_name: "pipelined_d"
  hagent_config_path: "/mada/users/jxie84/tmp/potato3/repo/hagent.yaml"

# Docker configuration
# docker:
#   image: "mascucsc/hagent-simplechisel:2025.10"
#   rtl_real_src_dir: "/code/workspace/build/build_pipelined_d"
#   chisel_path: "/repo/src/main/scala"

# Source file configuration
source_file_paths:
  rtl_source_file_path: "~/hagent/hagent/step/replicate_code/tests/rtl_code/testPipelineDino/rtl_real_source/"

# Tool paths and configuration
tools:
  liberty_file: "/mada/software/techfiles/sky130_fd_sc/sky130_fd_sc_hd__ff_100C_1v95.lib"
  sdc_file: "~/hagent/hagent/step/replicate_code/tests/rtl_code/testPipelineDino/PipelinedCPU.sdc"
  livehd_path: "~/livehd/"
  opensta_path: "/soe/jxie84/opt/opensta/bin/sta"
  yosys_cmd: "yosys"

# Local storage configuration
local_storage:
  cache_dir: "~/hagent/cache/"
  output_dir: "~/hagent/cache/pipeline_results"

# Optimization configuration
optimization:
  model: "openai/gpt-5.1-codex-mini"
  run_with_synalign: false  # For baseline run
  threshold: 40

# Metrics collection (will be populated by pipeline)
metrics:
  start_time: null
  end_time: null
  total_execution_time: null
  original_slack: null
  original_frequency: null
  modules_optimized: []

# Step results (populated by each step)
step_results:
  step_01_extract_rtl: {}
  step_02_create_top: {}
  step_03_split_modules: {}
  step_04_synthesize: {}
  step_05_timing_analysis: {}
  step_06_generate_yamls: {}
  step_07_optimize_modules: {}
  step_08_compare_timing: {}

# File paths (populated during execution)
populated_file_paths:
  rtl_real_src_dir: ""
  chisel_files: []
  rtl_selected_top_path: ""
  rtl_selected_top_file: ""
  rtl_path: ""
  synth_dir: ""
  synth_file: ""
  optimized_dir: "" 
