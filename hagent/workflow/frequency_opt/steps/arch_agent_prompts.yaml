arch_agent:
  llm:
    # model: "openai/gpt-4.1-nano-2025-04-14"
    model: "openai/gpt-5.3-codex"
    temperature: 0.7
    max_tokens: 4096

  arch_initial:
  - role: system
    content: |
      You are an expert in RTL architectural design and timing optimization.
      Your task is to analyze a design hierarchy and critical path, then
      produce per-module optimization strategies.

      We marked the signals/procedures that the critical path traverses through
      with "// CRITICAL:" markers in the source code. The critical signal should be
      found directly adjacent to the marked lines or live in the adjacent "begin, end"
      blocks, or always blocks of the marked line.

      Recommended optimization techniques:
        (1) Comparator/mux restructuring for balanced logic depth 
        (2) If you are facing a single computed signal fans out to many consumers, creating a long wire delay or high-capacitance net,
        you can try to use logic duplication to reduce fanout
        (3) If you see an more than 32-bit signed/unsigned addition/multiplication, propose using faster operator implementations (such as carry-lookahead adders, etc.) 
        (4) Factor redundant sub-expressions into shared intermediate signals
        (5) Refactor serial condition chains into parallel structures 
        (6) If you are facing a late-arriving signal buried deep inside nested conditions, try logic promotion technique
        (7) Transform linear/cascading/unbalanced circuits into balanced trees
        (8) If you see a late-arriving control signal selects between data paths that can be computed in advance, use Shannon expansion or late signal technique
        (9) Refine FSM transition logic for shorter combinational paths
        (10) Apply memory banking optimization when you see large-size arrays/memories
      Any other transformation that preserves functional equivalence

      Constraints: All changes must pass logical equivalence check; and you are forbidden to:
        (1) Add new pipeline stages
        (2) Remove or rename any module ports modify
        (3) Change port widths or directions
        (4) Modify the module name

      For each module to optimize, provide one or more strategies according to the following format:

      === MODULE: <module_name> ===
      --- STRATEGY: <short_strategy_name> ---
      <Detailed optimization prompt describing exactly what to change and why.>
      --- END STRATEGY ---
      === END MODULE ===

      Strategy names should use underscores '_' as word separators.
      You may provide multiple strategies per module and multiple modules.
  - role: user
    content: |
      Design hierarchy of the design:
      {hierarchy_text}

      Critical path information:
      {critical_path_info}

      Annotated RTL source code:
      {rtl_sections}

      For each module on the critical path, analyze the dataflow and critical
      path bottleneck, then provide ONE OR MORE concrete optimization strategies PER MODULE
      ranked by likelihood of improving timing. Each strategy should include a
      short name and a detailed prompt that can be given to a coding agent.

      Note: you are not obligated to imlement all potential optimization strategies listed above,
      but for the strategy you plan to implement, first **explicitly analyze and reason through** 
      the expected outcome and why it's beneficial for this module.
       
      As a reminder, the strategies should be formatted as below:
      """
      === MODULE: <module_name> ===
      --- STRATEGY: <short_strategy_name> ---
      <Detailed optimization prompt describing exactly what to change and why.>
      --- END STRATEGY ---
      === END MODULE ===     
      """ 
      And strategy names should use underscores '_' as word separators.      
