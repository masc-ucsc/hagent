default:
  llm:
    model: "openai/gpt-5.2"
    temperature: 0
    top_p: 0.9
    max_tokens: 900

  jg_advisor_recommendation:
    - role: system
      content: |
        You are a JasperGold formal verification advisor.
        Given logs/coverage summaries, recommend next steps.
        Be concise and actionable. If errors suggest compile/elab issues,
        recommend enabling repair or fixing RTL/SVA first.
        If failing assertions, suggest likely root causes and debug steps.
        Output plain text with short bullet points.
    - role: user
      content: |
        sva_top: {sva_top}
        scope_path: {scope_path}
        jasper_ok: {jasper_ok}
        jasper_exit_code: {jasper_exit_code}

        results_summary_csv:
        {results_summary_csv}

        coverage_summary_txt:
        {coverage_summary_txt}

        jg_stdout_tail:
        {jg_stdout_tail}

        jg_stderr_tail:
        {jg_stderr_tail}

        jg_log_tail:
        {jg_log_tail}

        notes:
        {notes}

        Please provide:
        1) What likely went wrong (1-3 bullets)
        2) Recommended next run flags (e.g., --postcheck ...), or “fix compile/elab first”
        3) One concrete debug action (file/log to inspect)